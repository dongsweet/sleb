services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: sleb
      POSTGRES_USER: sleb
      POSTGRES_PASSWORD: sleb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleb -d sleb"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sleb
      MINIO_ROOT_PASSWORD: sleb-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgres://sleb:sleb@postgres:5432/sleb
      VALKEY_URL: redis://valkey:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://sleb:sleb@postgres:5432/sleb
      VALKEY_URL: redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PUBLIC_WEB_URL: http://localhost:3000
      PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  valkey-data:
  minio-data:

